name: CI

on:
  pull_request:
    branches: [main, "release/*"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── Lint Frontend ──────────────────────────────────────────────
  lint-frontend:
    name: Frontend — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run type-check
      - run: npm run lint
      - run: npm run test
      - run: npx audit-ci --high

  # ── Lint Backend ───────────────────────────────────────────────
  lint-backend:
    name: Backend — lint + test + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check app/ tests/
      - run: mypy app/ --ignore-missing-imports
      - run: pytest tests/ --cov=app --cov-report=xml -q
      - uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml

  # ── Lint Helm ──────────────────────────────────────────────────
  lint-helm:
    name: Helm — lint + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: "3.15.0"
      - name: helm lint
        run: helm lint helm/grafana-mcp-platform/
      - name: helm lint dev
        run: helm lint helm/grafana-mcp-platform/ -f helm/grafana-mcp-platform/values-dev.yaml
      - name: helm lint prod
        run: helm lint helm/grafana-mcp-platform/ -f helm/grafana-mcp-platform/values-prod.yaml
      - name: kubesec scan
        run: |
          curl -sSfL https://raw.githubusercontent.com/controlplaneio/kubesec/master/scripts/install.sh | sh
          helm template grafana-mcp helm/grafana-mcp-platform/ \
            -f helm/grafana-mcp-platform/values-dev.yaml \
            | ./kubesec scan - || true  # warn only

  # ── Lint Terraform ─────────────────────────────────────────────
  lint-terraform:
    name: Terraform — validate + security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"
      - name: tf format check
        run: terraform fmt -check -recursive terraform/
      - name: tf validate modules
        run: |
          for dir in terraform/modules/*/; do
            echo "Validating $dir"
            cd "$dir" && terraform init -backend=false && terraform validate
            cd "$OLDPWD"
          done
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          quiet: true
          soft_fail: true

  # ── Security scans ─────────────────────────────────────────────
  security:
    name: Security — image scan + secret scan
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-backend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks — secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images for scanning
        run: |
          docker build -t scan-backend:pr backend/
          docker build -t scan-frontend:pr frontend/
          docker build -t scan-mcp:pr mcp-server/

      - name: Trivy — backend scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: scan-backend:pr
          format: table
          exit-code: "1"
          severity: CRITICAL

      - name: Trivy — frontend scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: scan-frontend:pr
          format: table
          exit-code: "1"
          severity: CRITICAL

      - name: Trivy — mcp-server scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: scan-mcp:pr
          format: table
          exit-code: "1"
          severity: CRITICAL

      - name: syft — SBOM generation (backend)
        uses: anchore/sbom-action@v0
        with:
          image: scan-backend:pr
          artifact-name: sbom-backend.spdx.json

      - name: syft — SBOM generation (frontend)
        uses: anchore/sbom-action@v0
        with:
          image: scan-frontend:pr
          artifact-name: sbom-frontend.spdx.json

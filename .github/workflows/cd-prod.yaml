name: CD — Deploy to PROD

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to deploy (e.g., 1.2.3)"
        required: true
        type: string
      confirm:
        description: "Type DEPLOY to confirm production deployment"
        required: true
        type: string

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    environment: production  # Requires 2-reviewer approval
    steps:
      - name: Verify confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "DEPLOY" ]; then
            echo "Confirmation text must be exactly: DEPLOY"
            exit 1
          fi

      - name: Verify version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Version must be semver: X.Y.Z"
            exit 1
          fi

  build-and-sign:
    name: Build production images
    runs-on: ubuntu-latest
    needs: preflight
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: sigstore/cosign-installer@v3

      - name: Build and push versioned images
        run: |
          VERSION="${{ inputs.version }}"
          for svc in backend frontend server; do
            dir="."
            [ "$svc" = "server" ] && dir="mcp-server"
            [ "$svc" = "backend" ] && dir="backend"
            [ "$svc" = "frontend" ] && dir="frontend"

            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --push \
              -t ${{ env.REGISTRY }}/grafana-mcp/${svc}:${VERSION} \
              -t ${{ env.REGISTRY }}/grafana-mcp/${svc}:latest \
              ${dir}/

            # Critical severity scan — fail deployment
            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
              aquasec/trivy image \
              --exit-code 1 --severity CRITICAL \
              ${{ env.REGISTRY }}/grafana-mcp/${svc}:${VERSION}

            # Sign with cosign
            cosign sign --yes ${{ env.REGISTRY }}/grafana-mcp/${svc}:${VERSION}
          done

  deploy-prod:
    name: Update PROD values → ArgoCD manual sync
    runs-on: ubuntu-latest
    needs: build-and-sign
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in values-prod.yaml
        run: |
          VERSION="${{ inputs.version }}"
          sed -i "s|tag: \".*\"|tag: \"${VERSION}\"|g" \
            helm/grafana-mcp-platform/values-prod.yaml

      - name: Commit updated values
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/grafana-mcp-platform/values-prod.yaml
          git commit -m "chore(release): bump prod to v${{ inputs.version }} [skip ci]"
          git push

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ inputs.version }}
          name: "v${{ inputs.version }}"
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚀 *Grafana MCP Platform v${{ inputs.version }}* deployed to PROD by ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}  # TODO: configure

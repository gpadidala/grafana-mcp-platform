apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: grafana-mcp-platform
  source:
    repoURL: "https://github.com/your-org/grafana-mcp-platform"  # TODO
    targetRevision: main
    path: helm/grafana-mcp-platform
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
      releaseName: grafana-mcp
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

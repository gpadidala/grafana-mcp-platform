global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: local
    env: development

scrape_configs:
  - job_name: grafana-mcp-backend
    static_configs:
      - targets: ['backend:8000']
    metrics_path: /metrics

  - job_name: grafana-mcp-server
    static_configs:
      - targets: ['mcp-server:8081']
    metrics_path: /metrics

  - job_name: grafana
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: /metrics
    honor_labels: true

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

# ── PROD environment overrides ────────────────────────────────────
global:
  cloudProvider: "aws"   # PROD runs on EKS

frontend:
  replicas: 3
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
  ingress:
    host: "mcp.your-domain.com"
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/rate-limit-rps: "50"

backend:
  replicas: 3
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  config:
    appEnv: production
    logLevel: INFO
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 12
  pdb:
    enabled: true
    minAvailable: 2

mcpServer:
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

externalSecrets:
  secretStore:
    aws:
      region: us-east-1
      secretPrefix: "grafana-mcp-prod"

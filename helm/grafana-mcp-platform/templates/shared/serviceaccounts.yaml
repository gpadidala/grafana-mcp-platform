---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "grafana-mcp-platform.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "grafana-mcp-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  annotations:
    {{- if eq .Values.global.cloudProvider "aws" }}
    eks.amazonaws.com/role-arn: ""   # TODO: set IRSA role ARN
    {{- else if eq .Values.global.cloudProvider "azure" }}
    azure.workload.identity/client-id: ""  # TODO: set managed identity client ID
    {{- else if eq .Values.global.cloudProvider "gcp" }}
    iam.gke.io/gcp-service-account: ""    # TODO: set GCP service account email
    {{- end }}
automountServiceAccountToken: false

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "grafana-mcp-platform.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "grafana-mcp-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  annotations:
    {{- if eq .Values.global.cloudProvider "aws" }}
    eks.amazonaws.com/role-arn: ""   # TODO: set IRSA role ARN with SecretsManager:GetSecretValue
    {{- else if eq .Values.global.cloudProvider "azure" }}
    azure.workload.identity/client-id: ""  # TODO: set managed identity
    {{- else if eq .Values.global.cloudProvider "gcp" }}
    iam.gke.io/gcp-service-account: ""
    {{- end }}
automountServiceAccountToken: false

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "grafana-mcp-platform.fullname" . }}-mcp-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "grafana-mcp-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-server
automountServiceAccountToken: false

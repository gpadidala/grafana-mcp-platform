{{- if .Values.externalSecrets.enabled }}
{{- $provider := .Values.global.cloudProvider }}
---
# SecretStore — one per cloud provider
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ include "grafana-mcp-platform.fullname" . }}-secret-store
  namespace: {{ .Release.Namespace }}
spec:
  {{- if eq $provider "aws" }}
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.externalSecrets.secretStore.aws.region }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ include "grafana-mcp-platform.fullname" . }}-backend
  {{- else if eq $provider "azure" }}
  provider:
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: {{ .Values.externalSecrets.secretStore.azure.vaultUrl | quote }}
      serviceAccountRef:
        name: {{ include "grafana-mcp-platform.fullname" . }}-backend
  {{- else if eq $provider "gcp" }}
  provider:
    gcpsm:
      projectID: {{ .Values.externalSecrets.secretStore.gcp.projectId | quote }}
      auth:
        workloadIdentity:
          clusterLocation: ""   # TODO: set cluster location
          clusterName: ""       # TODO: set cluster name
          clusterProjectID: {{ .Values.externalSecrets.secretStore.gcp.projectId | quote }}
          serviceAccountRef:
            name: {{ include "grafana-mcp-platform.fullname" . }}-backend
  {{- end }}

---
# ExternalSecret for LLM API keys
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "grafana-mcp-platform.fullname" . }}-llm-secrets
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ include "grafana-mcp-platform.fullname" . }}-secret-store
    kind: SecretStore
  target:
    name: grafana-mcp-llm-secrets
    creationPolicy: Owner
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.secretStore.aws.secretPrefix }}/openai-api-key
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.secretStore.aws.secretPrefix }}/anthropic-api-key
    - secretKey: AZURE_OPENAI_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.secretStore.aws.secretPrefix }}/azure-openai-api-key

---
# ExternalSecret for Grafana credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "grafana-mcp-platform.fullname" . }}-grafana-secrets
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ include "grafana-mcp-platform.fullname" . }}-secret-store
    kind: SecretStore
  target:
    name: grafana-mcp-grafana-secrets
    creationPolicy: Owner
  data:
    - secretKey: GRAFANA_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.secretStore.aws.secretPrefix }}/grafana-api-key

---
# ExternalSecret for auth secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "grafana-mcp-platform.fullname" . }}-auth-secrets
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ include "grafana-mcp-platform.fullname" . }}-secret-store
    kind: SecretStore
  target:
    name: grafana-mcp-auth-secrets
    creationPolicy: Owner
  data:
    - secretKey: API_KEY_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.secretStore.aws.secretPrefix }}/api-key-secret
{{- end }}

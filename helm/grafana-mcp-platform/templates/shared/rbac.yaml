---
# Backend — minimal Role (no ClusterRole)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "grafana-mcp-platform.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames:
      - {{ .Values.backend.secrets.openaiApiKeySecretName }}
      - {{ .Values.backend.secrets.grafanaApiKeySecretName }}
      - {{ .Values.backend.secrets.apiKeySecretName }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "grafana-mcp-platform.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "grafana-mcp-platform.fullname" . }}-backend
subjects:
  - kind: ServiceAccount
    name: {{ include "grafana-mcp-platform.fullname" . }}-backend
    namespace: {{ .Release.Namespace }}

{{- if and .Values.backend.enabled .Values.backend.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "grafana-mcp-platform.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "grafana-mcp-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  minAvailable: {{ .Values.backend.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "grafana-mcp-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
{{- end }}

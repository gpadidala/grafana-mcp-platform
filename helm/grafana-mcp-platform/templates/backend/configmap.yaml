{{- if .Values.backend.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "grafana-mcp-platform.fullname" . }}-backend-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "grafana-mcp-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
data:
  LOG_LEVEL: {{ .Values.backend.config.logLevel | quote }}
  APP_ENV: {{ .Values.backend.config.appEnv | quote }}
  ENABLE_STREAMING: {{ .Values.backend.config.enableStreaming | quote }}
  MAX_TOOL_ITERATIONS: {{ .Values.backend.config.maxToolIterations | quote }}
  DEFAULT_LLM_PROVIDER: {{ .Values.backend.config.defaultLLMProvider | quote }}
  DEFAULT_MODEL: {{ .Values.backend.config.defaultModel | quote }}
  ALLOWED_ORIGINS: "https://{{ .Values.frontend.ingress.host }}"
{{- end }}
